<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricbook</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    
    <header class="header">
        <p class="header__title">Cricbook</p>
    </header>
    
    <main>
        
        <section class="search">
            <input class="search__input" type="text" id="player-search" placeholder="Search player">
            <button class="search__button--clear button--primary">Clear</button>
        </section>

        <div class="search__result"></div>

        <section class="IPL-players">
            <h2>IPL Players</h2>
            <div class="IPL-players__list"></div>
        </section>
    
    </main>
    
    <footer class="footer">
        <p>Made with ❤️ by 
            <a class="footer__link" href="https://rishiverma.netlify.app/">Rishi Verma</a>
        </p>
    </footer>
    
    <script type="module" src="./scripts/main.js"></script>

</body>
</html>
